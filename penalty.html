<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  font-family: 'Noto Sans Thai', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.penaltyBoard { display: flex; flex-direction: column; gap: 4px; }

.teamRow {
  display: flex;
  align-items: stretch;
  height: 56px;
  gap: 4px;
  background: #1a1a1a;
}

.shortName {
  display: flex; align-items: center; justify-content: center;
  min-width: 80px; padding: 0 12px;
  font-size: 22px; font-weight: 900;
  white-space: nowrap; letter-spacing: 1px;
}

.kicks { display: flex; align-items: center; gap: 6px; }

/* Base circle */
.kick {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: visible;
}

/* Pending — match scoreboard dark grey */
.kick.pending {
  background: #333;
  border: 2px solid #444;
}

/* Scored — green with glow */
.kick.scored {
  background: radial-gradient(circle at 35% 35%, #5eff7a, #1db954);
  box-shadow: 0 0 0 0 rgba(46, 204, 64, 0.6);
}

/* Missed — red */
.kick.missed {
  background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
  box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.6);
}

/* Symbol inside — visible by default */
.kick .symbol {
  font-size: 22px;
  font-weight: 900;
  line-height: 1;
  display: block;
  opacity: 1;
}

/* Hide symbol only when pending (no symbol anyway) */
.kick.pending .symbol {
  opacity: 0;
}

/* ── SCORED: ripple zoom fills circle, then symbol appears ── */
.kick.scored.animate {
  animation: zoomFillScored 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.kick.scored.animate .symbol {
  animation: symbolFadeIn 0.25s ease 0.25s both;
}

@keyframes zoomFillScored {
  0%   { transform: scale(0.1); opacity: 0.5;
         box-shadow: 0 0 0 0 rgba(46,204,64,0.9); }
  60%  { transform: scale(1.18);
         box-shadow: 0 0 20px 8px rgba(46,204,64,0.5); }
  80%  { transform: scale(0.95); }
  100% { transform: scale(1);
         box-shadow: 0 0 6px 2px rgba(46,204,64,0.2); }
}

/* ── MISSED: ripple zoom fills circle red, symbol appears ── */
.kick.missed.animate {
  animation: zoomFillMissed 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.kick.missed.animate .symbol {
  animation: symbolFadeIn 0.25s ease 0.2s both;
}

@keyframes zoomFillMissed {
  0%   { transform: scale(0.1); opacity: 0.5;
         box-shadow: 0 0 0 0 rgba(229,57,53,0.9); }
  60%  { transform: scale(1.18);
         box-shadow: 0 0 20px 8px rgba(229,57,53,0.5); }
  80%  { transform: scale(0.95); }
  100% { transform: scale(1);
         box-shadow: 0 0 4px 1px rgba(229,57,53,0.2); }
}

/* Symbol fades+scales in after circle fills */
@keyframes symbolFadeIn {
  0%   { transform: scale(0.3); opacity: 0; }
  100% { transform: scale(1);   opacity: 1; }
}

/* Score number */
.scoreNum {
  display: flex; align-items: center; justify-content: center;
  min-width: 52px; font-size: 28px; font-weight: 900;
  color: #fff; background: #222; padding: 0 12px;
  /* matches .scoreBox dark square from main scoreboard */
}

/* Score pop when it changes */
.scoreNum.scorePop {
  animation: scorePop 0.4s ease;
}
@keyframes scorePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); color: #2ecc40; }
  100% { transform: scale(1);   color: #fff; }
}
</style>
</head>
<body>

<div class="penaltyBoard">
  <div class="teamRow">
    <div class="shortName" id="penShort1">TMA</div>
    <div class="kicks" id="kicks1"></div>
    <div class="scoreNum" id="penScore1">0</div>
  </div>
  <div class="teamRow">
    <div class="shortName" id="penShort2">TMB</div>
    <div class="kicks" id="kicks2"></div>
    <div class="scoreNum" id="penScore2">0</div>
  </div>
</div>

<script>
const socket = io();

let state = {
  1: { kicks: ["pending","pending","pending","pending","pending"], score: 0 },
  2: { kicks: ["pending","pending","pending","pending","pending"], score: 0 }
};

let prevState = {
  1: { kicks: ["pending","pending","pending","pending","pending"], score: 0 },
  2: { kicks: ["pending","pending","pending","pending","pending"], score: 0 }
};

function renderKicks(team) {
  const container = document.getElementById("kicks" + team);
  const kicks = state[team].kicks;
  const prev  = prevState[team].kicks;

  kicks.forEach((result, i) => {
    let el = document.getElementById("kick" + team + "_" + i);
    const isNew = !el;

    if (isNew) {
      el = document.createElement("div");
      el.id = "kick" + team + "_" + i;
      // new pending circles pop in small
      el.style.transform = "scale(0)";
      el.style.transition = "transform 0.3s ease";
      container.appendChild(el);
      requestAnimationFrame(() => { el.style.transform = "scale(1)"; });
    }

    const prevResult = isNew ? "pending" : (prev[i] || "pending");
    const changed = prevResult !== result && result !== "pending";

    // Build inner symbol span
    const symbol = result === "scored" ? "✓" : result === "missed" ? "X" : "";

    el.className = "kick " + result;
    el.innerHTML = `<span class="symbol" style="color:#ffffff">${symbol}</span>`;

    if (changed) {
      // Force reflow then add animate class
      void el.offsetWidth;
      el.classList.add("animate");
      // Also pop the symbol
      const sym = el.querySelector(".symbol");
      if (sym) {
        sym.style.transform = ""; // reset so animation replays
      }
      // Remove animate class after animation ends so it can replay
      el.addEventListener("animationend", () => {
        el.classList.remove("animate");
      }, { once: true });
    } else if (result !== "pending") {
      // Already set — show symbol without animation
      const sym = el.querySelector(".symbol");
      if (sym) sym.style.transform = "scale(1)";
    }
  });

  // Score number
  const scoreEl = document.getElementById("penScore" + team);
  const prevScore = prevState[team].score;
  scoreEl.textContent = state[team].score;
  if (state[team].score !== prevScore && state[team].score > prevScore) {
    scoreEl.classList.remove("scorePop");
    void scoreEl.offsetWidth;
    scoreEl.classList.add("scorePop");
    scoreEl.addEventListener("animationend", () => scoreEl.classList.remove("scorePop"), { once: true });
  }
}

function renderAll() {
  renderKicks(1);
  renderKicks(2);
  // Save snapshot
  prevState = JSON.parse(JSON.stringify(state));
}

socket.on("update", d => {
  document.getElementById("penShort1").textContent      = d.team1Short || "TMA";
  document.getElementById("penShort2").textContent      = d.team2Short || "TMB";
  document.getElementById("penShort1").style.background = d.team1Color || "#1e88e5";
  document.getElementById("penShort2").style.background = d.team2Color || "#fdd835";
  document.getElementById("penShort1").style.color      = d.team1TextColor || "#ffffff";
  document.getElementById("penShort2").style.color      = d.team2TextColor || "#000000";
});

socket.on("penaltyState", (data) => {
  // Snapshot old before updating
  prevState = JSON.parse(JSON.stringify(state));
  state[1] = data[1];
  state[2] = data[2];
  renderAll();
});

// Initial render (no animations)
renderAll();
</script>
</body>
</html>
